name: Build Chrome Extension

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: chrome-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package extension
        run: npm run pack

      - name: Generate checksum
        run: |
          mkdir -p build
          sha256sum build/chrome-extension-yuque-export.zip > build/chrome-extension-yuque-export.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-yuque-export
          path: |
            build/chrome-extension-yuque-export.zip
            build/chrome-extension-yuque-export.zip.sha256
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: YuqueOut ${{ github.ref_name }}
          files: |
            build/chrome-extension-yuque-export.zip
            build/chrome-extension-yuque-export.zip.sha256
          body: |
            ## YuqueOut ${{ github.ref_name }}

            ### 安装包
            - `chrome-extension-yuque-export.zip`
            - `chrome-extension-yuque-export.zip.sha256`

            ### 使用方式
            1. 下载并解压 zip。
            2. 打开 Chrome 扩展管理页 `chrome://extensions/`。
            3. 开启“开发者模式”。
            4. 点击“加载已解压的扩展程序”，选择解压后的目录。

            ### 发布说明
            详细更新内容请查看本次 tag 对应的提交记录。
          draft: false
          prerelease: false
