<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg-special" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg-special)"/>
  <!-- Three document type icons -->
  <g transform="translate(60, 50)">
    <!-- Sheet icon -->
    <rect x="0" y="0" width="55" height="45" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="15" x2="55" y2="15" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <line x1="0" y1="30" x2="55" y2="30" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="45" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="27" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Sheet</text>
  </g>
  <g transform="translate(160, 50)">
    <!-- Board icon -->
    <rect x="0" y="0" width="55" height="45" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
    <rect x="8" y="8" width="15" height="12" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="30" y="8" width="15" height="12" rx="2" fill="rgba(255,255,255,0.3)"/>
    <path d="M15 20 L15 28 L37 28 L37 20" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/>
    <circle cx="26" cy="35" r="4" fill="rgba(255,255,255,0.3)"/>
    <text x="27" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Board</text>
  </g>
  <g transform="translate(260, 50)">
    <!-- DataTable icon -->
    <rect x="0" y="0" width="55" height="45" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="27" cy="12" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="42" cy="12" r="4" fill="rgba(255,255,255,0.4)"/>
    <line x1="5" y1="22" x2="50" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="5" y1="30" x2="45" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="5" y1="38" x2="40" y2="38" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="27" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Table</text>
  </g>
  <!-- Arrow down -->
  <path d="M200 130 L200 150" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <path d="M194 145 L200 153 L206 145" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  <!-- Format badges -->
  <g transform="translate(100, 158)">
    <rect x="0" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
    <text x="20" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="white">CSV</text>
    <rect x="48" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
    <text x="68" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="white">PNG</text>
    <rect x="96" y="0" width="40" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
    <text x="116" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="white">SVG</text>
    <rect x="144" y="0" width="45" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
    <text x="166" y="13" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="white">Excel</text>
  </g>
  <!-- Text -->
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">Special Document Export Guide</text>
</svg>
