  <text x="245" y="130" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.5)">`code`</text>
  <!-- MD badge -->
  <rect x="275" y="142" width="28" height="14" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1"/>
