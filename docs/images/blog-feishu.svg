<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg-fs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3370ff"/>
      <stop offset="100%" stop-color="#2b5cdb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg-fs)"/>
  <!-- Yuque icon (left) -->
  <g transform="translate(100, 60)">
    <circle cx="30" cy="30" r="25" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
    <text x="30" y="37" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">语雀</text>
  </g>
  <!-- Arrow -->
  <path d="M165 90 L215 90" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <path d="M208 84 L218 90 L208 96" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Feishu icon (right) -->
  <g transform="translate(230, 60)">
    <circle cx="30" cy="30" r="25" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2"/>
    <text x="30" y="37" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">飞书</text>
  </g>
  <!-- Speed badge -->
  <rect x="155" y="120" width="90" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="200" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="white">30 min</text>
  <!-- Text -->
  <text x="200" y="175" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.9)">语雀 → 飞书迁移指南</text>
  <text x="200" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">从导出到导入一篇搞定</text>
</svg>
