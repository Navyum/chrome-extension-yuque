<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg-wysiwyg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg-wysiwyg)"/>
  <!-- Eye icon (WYSIWYG = What You See Is What You Get) -->
  <g transform="translate(155, 45)">
    <ellipse cx="45" cy="35" rx="40" ry="25" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
    <circle cx="45" cy="35" r="12" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2"/>
    <circle cx="45" cy="35" r="5" fill="white"/>
  </g>
  <!-- Arrow from eye to document -->
  <path d="M200 95 L200 115" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M194 110 L200 118 L206 110" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Document icon -->
  <g transform="translate(170, 120)">
    <rect x="0" y="0" width="60" height="50" rx="4" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
    <path d="M45 0 L60 15" stroke="white" stroke-width="1.5"/>
    <path d="M45 0 L45 15 L60 15" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
    <!-- Lines in doc -->
    <line x1="10" y1="25" x2="40" y2="25" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <line x1="10" y1="33" x2="35" y2="33" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="10" y1="41" x2="30" y2="41" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  </g>
  <!-- Checkmark badge -->
  <circle cx="240" cy="130" r="10" fill="rgba(67,233,123,0.8)"/>
  <path d="M235 130 L238 133 L245 126" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="200" y="193" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">What You See Is What You Export</text>
  <text x="200" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">No Permission Required</text>
</svg>
