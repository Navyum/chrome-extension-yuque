<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg2)"/>
  <!-- Warning symbols -->
  <g opacity="0.2">
    <circle cx="80" cy="60" r="20" stroke="white" stroke-width="2"/>
    <circle cx="320" cy="170" r="15" stroke="white" stroke-width="1.5"/>
    <circle cx="340" cy="50" r="12" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Main icon: puzzle with missing piece -->
  <rect x="150" y="55" width="45" height="45" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="205" y="55" width="45" height="45" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="150" y="110" width="45" height="45" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="205" y="110" width="45" height="45" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Question mark in missing piece -->
  <text x="227" y="140" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.5)">?</text>
  <!-- Check marks in filled pieces -->
  <path d="M165 78 L172 85 L185 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M220 78 L227 85 L240 72" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M165 133 L172 140 L185 127" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="200" y="185" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)">7 Pain Points Solved</text>
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Common Issues &amp; Fixes</text>
</svg>
